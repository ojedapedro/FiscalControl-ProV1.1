
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <meta name="theme-color" content="#184038" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Fiscal Control Pro</title>
    <!-- Favicon dinámico -->
    <link rel="icon" type="image/jpeg" href="https://i.ibb.co/GvxRWGWB/Pix-Verse-Image-Effect-prompt-crea-una-imagen-p.jpg" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="https://i.ibb.co/GvxRWGWB/Pix-Verse-Image-Effect-prompt-crea-una-imagen-p.jpg">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Script de diagnóstico de arranque -->
    <script>
      // Unregister any existing service workers to ensure the latest version is loaded
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
            console.log('Service Worker unregistered to force update.');
          }
        });
      }

      window.addEventListener('error', function(e) {
        console.error("Global Error caught:", e.message);
        const root = document.getElementById('root');
        if (root && root.childNodes.length === 0) {
           // Si hay error y el root está vacío, mostramos el error en pantalla
           setTimeout(() => {
             if(root.childNodes.length === 0) {
               document.body.innerHTML = '<div style="color:red; padding:20px;"><h1>Error de Carga</h1><p>'+e.message+'</p></div>';
             }
           }, 1000);
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- PUNTO DE ENTRADA CRÍTICO -->
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
